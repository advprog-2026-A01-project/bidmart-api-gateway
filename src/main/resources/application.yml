server:
  port: ${PORT:8080}

spring:
  application:
    name: bidmart-api-gateway
  main:
    web-application-type: reactive
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}

services:
  auth:
    base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8081}
  catalog:
    base-url: ${CATALOG_SERVICE_BASE_URL:http://localhost:8082}
  auction-wallet:
    base-url: ${AUCTION_WALLET_SERVICE_BASE_URL:http://localhost:8083}

app:
  frontend-origin: ${FRONTEND_ORIGIN:http://localhost:5173}
  gateway-secret: ${GATEWAY_SECRET:local-dev-gateway-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
