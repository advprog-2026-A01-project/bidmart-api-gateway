name: API Gateway CI

on:
  push:
    branches:
      - main
      - "tdd/**"
      - "feat/**"
      - "ci/**"
      - "chore/**"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Test and PMD
        run: ./gradlew clean generateProto test pmdMain pmdTest

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gateway-quality-reports
          path: |
            build/reports/tests/test
            build/reports/pmd

  docker:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bidmart-api-gateway:ci .
